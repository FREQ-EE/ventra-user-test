        { colour: MONKEY_BLUE_COLOUR, blurCss: 1.4,  dx: 2.0 * dpr,    dy: 0.0 * dpr,    lw: lwGlow, mode: 'source-over', alpha: 0.70 },
        { colour: MONKEY_RED_COLOUR,  blurCss: 1.4,  dx: -2.0 * dpr,   dy: 0.0 * dpr,    lw: lwGlow, mode: 'source-over', alpha: 0.70 },
        { colour: MONKEY_GOLD_COLOUR, blurCss: 1.0,  dx: 0.0 * dpr,    dy: 2.0 * dpr,    lw: lwGlow, mode: 'source-over', alpha: 0.65 },
        { colour: MONKEY_BASE_COLOUR, blurCss: 0.0,  dx: 0.0 * dpr,    dy: 0.0 * dpr,    lw: lwBase, mode: 'source-over', alpha: 0.55 },
      ];

      for (const L of layers) {
        ctx.save();
        ctx.translate(L.dx, L.dy);
        ctx.filter = (L.blurCss > 0) ? `blur(${(L.blurCss * dpr).toFixed(4)}px)` : 'none';
        ctx.globalCompositeOperation = (L.mode === 'hard-light') ? 'hard-light' : 'source-over';
        ctx.globalAlpha = clamp(L.alpha * alphaScale, 0, 1);
        ctx.strokeStyle = L.colour;
        ctx.lineWidth = L.lw;
        roundRectPath(ctx, x, y, w, h, r);
        ctx.stroke();
        ctx.restore();
      }

      ctx.globalAlpha = 1;
      ctx.filter = 'none';
      ctx.globalCompositeOperation = 'source-over';
    }

    function uiFillText(text, x, y, colour, alpha = 1.0, intensityOverride = null) {
      const a0 = alpha;
      const baseIntensity = (intensityOverride !== null)
        ? intensityOverride
        : UI_TEXT_FX_INTENSITY;

      if (!UI_TEXT_FX_ENABLED || baseIntensity <= 0) {
        ctx.save();
        ctx.globalAlpha = a0;
        ctx.fillStyle = colour;
        ctx.fillText(text, x, y);
        ctx.restore();
        return;
      }

      const k = baseIntensity;

      const dxR = (UI_TEXT_FX_RED_X_PX  * k) * dpr;
      const dxB = (UI_TEXT_FX_BLUE_X_PX * k) * dpr;
      const dyG = (UI_TEXT_FX_GOLD_Y_PX * k) * dpr;

      const blur = Math.max(0, UI_TEXT_FX_BLUR_PX * k) * dpr;

      // Colour passes
      ctx.save();
      ctx.globalCompositeOperation = UI_TEXT_FX_COMPOSITE;

      // Red
      ctx.globalAlpha = a0 * clamp(UI_TEXT_FX_ALPHA_RGB * k, 0, 1);
      ctx.fillStyle = MONKEY_RED_COLOUR;
      ctx.filter = (blur > 0) ? `blur(${blur.toFixed(4)}px)` : 'none';
      ctx.fillText(text, x + dxR, y);

      // Blue
      ctx.fillStyle = MONKEY_BLUE_COLOUR;
      ctx.fillText(text, x + dxB, y);

      // Gold (slight vertical phosphor smear)
      ctx.globalAlpha = a0 * clamp(UI_TEXT_FX_ALPHA_GOLD * k, 0, 1);
      ctx.fillStyle = MONKEY_GOLD_COLOUR;
      ctx.fillText(text, x, y + dyG);

      ctx.restore();

      // Base pass (main readable text)
      ctx.save();
      ctx.globalAlpha = a0;
      ctx.fillStyle = colour;

      if (UI_TEXT_FX_SOFTEN_BASE) {
        const b = Math.max(0, UI_TEXT_FX_BASE_BLUR_PX * k) * dpr;
        ctx.filter = (b > 0) ? `blur(${b.toFixed(4)}px)` : 'none';
      } else {
        ctx.filter = 'none';
      }

      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function hexToRgb01(hex) {
      const h = String(hex).trim().replace('#', '');
      const v = (h.length === 3)
        ? h.split('').map(ch => ch + ch).join('')
        : h;
      const n = parseInt(v, 16);
      const r = ((n >> 16) & 255) / 255;
      const g = ((n >> 8) & 255) / 255;
      const b = (n & 255) / 255;
      return { r, g, b };
    }

    function rgb01ToHex({ r, g, b }) {
      const R = clamp(Math.round(r * 255), 0, 255);
      const G = clamp(Math.round(g * 255), 0, 255);
      const B = clamp(Math.round(b * 255), 0, 255);
      return `#${R.toString(16).padStart(2,'0')}${G.toString(16).padStart(2,'0')}${B.toString(16).padStart(2,'0')}`;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function lerpHex(aHex, bHex, t) {
      const a = hexToRgb01(aHex);
      const b = hexToRgb01(bHex);
      return rgb01ToHex({
        r: lerp(a.r, b.r, t),
        g: lerp(a.g, b.g, t),
        b: lerp(a.b, b.b, t)
      });
    }

    function drawPulseVuStacks(cx, cy, opts = {}) {
      // Centre point anchor, draw 3 stacks of 7 rounded segments.
      const stacks = opts.stacks ?? PULSE_VU_STACKS;
      const segs   = opts.segs   ?? PULSE_VU_SEGMENTS;

      const stackW = Math.round((opts.stackWpx ?? PULSE_VU_W_PX) * dpr);
      const stackH = Math.round((opts.stackHpx ?? PULSE_VU_H_PX) * dpr);
      const gapX   = Math.round((opts.stackGapPx ?? PULSE_VU_STACK_GAP_PX) * dpr);
      const segGap = Math.round((opts.segGapPx ?? PULSE_VU_SEG_GAP_PX) * dpr);
      const rCss   = (opts.radiusPx ?? PULSE_VU_RADIUS_PX);

      const totalW = stacks * stackW + (stacks - 1) * gapX;
      const leftX = Math.round(cx - totalW * 0.5);
      const topY  = Math.round(cy - stackH * 0.5);

      // Completed pulses are “locked” (full stacks) while pulseWindowT > 0.
      const completed = clamp(pulseCount, 0, stacks); // 0..2 normally
      const activeIdx = clamp(completed, 0, stacks - 1);

      const accentA = cssVar('--accentA');
      const accentB = cssVar('--accentB');
      const muted   = cssVar('--muted');

      for (let si = 0; si < stacks; si++) {
        const x0 = leftX + si * (stackW + gapX);

        let fillFrac = 0;

        if (pulseCount >= stacks) {
          fillFrac = 1;
        } else if (pulseWindowT > 0) {
          if (si < pulseCount) {
            fillFrac = 1; // completed stacks
          } else if (si === pulseCount) {
            // current stack being filled: show live progress as peak/120
            if (startDelayT > 0) {
              fillFrac = 1; // during final hold, show fully filled
            } else if (startPulseActive) {
              fillFrac = clamp(startPulsePeak / Math.max(1, START_FILL_CC2), 0, 1);
            } else {
              fillFrac = 0;
            }
          } else {
            fillFrac = 0;
          }
        } else {
          fillFrac = 0;
        }

        const filledSegs = clamp(Math.round(fillFrac * segs), 0, segs);

        // Segment geometry (bottom-up fill).
        const segH = Math.floor((stackH - (segs - 1) * segGap) / segs);
        const usedH = segH * segs + segGap * (segs - 1);
        const yBase = topY + Math.round((stackH - usedH) * 0.5);

        for (let j = 0; j < segs; j++) {
          const y = yBase + (segs - 1 - j) * (segH + segGap); // bottom segment is j=0
          const isLit = (j < filledSegs);

          // Fill (lit)
          if (isLit) {
            // Vertical colour progression: bottom = accentA (purple), top = accentB (pink)
            const tSeg = (segs <= 1) ? 1 : (j / (segs - 1)); // j: 0(bottom) .. segs-1(top)
            // Optional bias so pink concentrates nearer the top:
            const tBiased = Math.pow(tSeg, 1.35);

            const col = lerpHex(accentA, accentB, tBiased);

            ctx.save();
            ctx.globalAlpha = 0.90;
            ctx.fillStyle = col;
            roundRectPath(ctx, x0, y, stackW, segH, Math.round(rCss * dpr));
            ctx.fill();

            // subtle glow lift
            ctx.globalAlpha = 0.22;
            ctx.shadowColor = col;
            ctx.shadowBlur = Math.round(10 * dpr);
            roundRectPath(ctx, x0, y, stackW, segH, Math.round(rCss * dpr));
            ctx.fill();
            ctx.restore();
          }

          // Outline (always, with neon-ish aberration)
          // Slightly dim empty segments.
          const a = isLit ? 1.0 : 0.35;
          drawNeonRoundRectStroke(x0, y, stackW, segH, rCss, a);

          // Optional faint interior stroke for empty segments to read better
          if (!isLit) {
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.strokeStyle = muted;
            ctx.lineWidth = Math.max(1, Math.round(0.8 * dpr));
            roundRectPath(ctx, x0 + 0.5 * dpr, y + 0.5 * dpr, stackW - 1 * dpr, segH - 1 * dpr, Math.round((rCss - 1) * dpr));
            ctx.stroke();
            ctx.restore();
          }
        }
      }
    }

    function drawLeaderboardHud(w, h, yTop) {
      const s = uiScalePx();

      // Keep your existing anchors
      const xLeft  = Math.round(w * 0.10);
      const xRight = Math.round(w * 0.90);

      const fontPx = Math.round((12 * s) * dpr);
      const lineH  = Math.round((16 * s) * dpr);

      const muted = cssVar('--muted');

      // Be robust to your current variable naming (Top10 vs top10)
      const rows = (typeof Top10 !== 'undefined' && Array.isArray(Top10))
        ? Top10
        : ((typeof top10 !== 'undefined' && Array.isArray(top10)) ? top10 : []);

      const n = Math.min(LEADERBOARD_LIMIT, rows.length);

      // Tight, controlled gap between columns
      const COL_GAP = Math.round(12 * s * dpr);

      ctx.save();
      ctx.font = `${fontPx}px "JetBrains Mono", ui-monospace, monospace`;
      ctx.textBaseline = 'top';

      // Personal best (left)
      ctx.globalAlpha = 0.88;
      ctx.fillStyle = muted;
      ctx.textAlign = 'left';
      uiFillText(`PB: ${formatScoreMs(personalBestMs)}`, xLeft, yTop, muted, 0.88);

      // Measure max widths to avoid giant empty space while keeping alignment stable
      let maxLeftW = 0;
      let maxScoreW = 0;

      for (let i = 0; i < n; i++) {
        const row = rows[i] || {};
        const rank = String(i + 1).padStart(2, '0');
        const cs = String(row.callsign || '?????').toUpperCase();
        const leftText = `${rank}  ${cs}`;
        const scoreText = formatScoreMs((row.score_ms | 0));

        maxLeftW = Math.max(maxLeftW, Math.ceil(ctx.measureText(leftText).width));
        maxScoreW = Math.max(maxScoreW, Math.ceil(ctx.measureText(scoreText).width));
      }

      // Block layout (anchored at xRight, not mid-screen)
      const rightColX = xRight;
      const leftColX  = Math.round(rightColX - maxScoreW - COL_GAP - maxLeftW);

      // Header centred over the block
      const blockLeft  = leftColX;
      const blockRight = rightColX;
      const blockCx    = Math.round((blockLeft + blockRight) * 0.5);

      ctx.textAlign = 'center';
      uiFillText(`TOP ${LEADERBOARD_LIMIT}`, blockCx, yTop, muted, 0.88);

      // Rows
      ctx.globalAlpha = 0.86;
      ctx.fillStyle = muted;

      for (let i = 0; i < n; i++) {
        const row = rows[i] || {};
        const rank = String(i + 1).padStart(2, '0');
        const cs = String(row.callsign || '?????').toUpperCase();
        const leftText = `${rank}  ${cs}`;
        const scoreText = formatScoreMs((row.score_ms | 0));

        const yy = yTop + (i + 1) * lineH;

        ctx.textAlign = 'left';
        uiFillText(leftText, leftColX, yy, muted, 0.86);

        ctx.textAlign = 'right';
        uiFillText(scoreText, rightColX, yy, muted, 0.86);
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawHelpOverlay(w, h) {
      const s = uiScalePx();

      // === Transparency controls (adjust these) ===
      const HELP_DIM_ALPHA = 0.45;   // backdrop dim (0..1). Higher = darker background.
      const HELP_BOX_ALPHA = 0.92;   // panel opacity (0..1). Higher = more opaque panel.
      // ===========================================

      // Backdrop
      ctx.save();
      ctx.globalAlpha = HELP_DIM_ALPHA;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      // Panel box
      const boxW = Math.round(w * 0.86);
      const boxH = Math.round(h * 0.68);
      const boxX = Math.round((w - boxW) * 0.5);
      const boxY = Math.round((h - boxH) * 0.5);
      const r = Math.round(16 * s * dpr);

      ctx.save();
      ctx.globalAlpha = HELP_BOX_ALPHA;
      ctx.fillStyle = 'rgba(0,0,0,0.78)';
      roundRectPath(ctx, boxX, boxY, boxW, boxH, r);
      ctx.fill();

      ctx.globalAlpha = 0.70;
      ctx.strokeStyle = cssVar('--border');
      ctx.lineWidth = Math.max(1, Math.round(1 * dpr));
      ctx.stroke();

      // Text metrics
      const pad = Math.round(18 * s * dpr);
      const x0 = boxX + pad;
      let y0 = boxY + pad;

      const titlePx = Math.round((14 * s) * dpr);
      const bodyPx  = Math.round((12 * s) * dpr);
      const lineH   = Math.round((18 * s) * dpr);

      const colText  = cssVar('--text');
      const colMuted = cssVar('--muted');

      function drawLine(text, opts = {}) {
        ctx.save();
        ctx.globalAlpha = opts.alpha ?? 0.92;
        ctx.fillStyle = opts.colour ?? colMuted;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.font = `${opts.weight ?? 400} ${opts.sizePx ?? bodyPx}px ${opts.family ?? '"JetBrains Mono", ui-monospace, monospace'}`;
        uiFillText(text, x0, y0, (opts.colour ?? colMuted), (opts.alpha ?? 0.92));
        ctx.restore();
        y0 += (opts.advance ?? lineH);
      }

      // Title
      drawLine('Browser & MIDI Setup', {
        colour: colText,
        alpha: 0.95,
        weight: 900,
        sizePx: titlePx,
        family: 'Orbitron, system-ui, sans-serif',
        advance: Math.round(lineH * 1.1)
      });

      drawLine('Ventra uses WebMIDI. Support depends on browser.', {
        colour: colMuted,
        alpha: 0.90,
        advance: Math.round(lineH * 1.2)
      });

      // Bullet sections (Chrome/Firefox/Safari)
      const bullet = '• ';

      // Chrome / Edge
      drawLine(`${bullet}Chrome / Edge (recommended):`, { colour: colText, alpha: 0.92, weight: 800 });
      drawLine('WebMIDI works natively. Plug in Ventra and refresh if not detected.', {
        colour: colMuted, alpha: 0.92, advance: Math.round(lineH * 1.15)
      });

      // Firefox
      drawLine(`${bullet}Firefox:`, { colour: colText, alpha: 0.92, weight: 800 });

      drawLine('1) Close Firefox. Plug in Ventra. Reopen Firefox. (Otherwise Firefox may show no MIDI ports.)', { alpha: 0.92 });
      drawLine('2) When prompted, Allow MIDI device access (and SysEx if requested).', { alpha: 0.92 });
      drawLine('3) For music: click the speaker button once (autoplay is often blocked).', { alpha: 0.92 });

      drawLine('If MIDI still does not work: open about:config → set dom.webmidi.enabled to true → refresh.', {
        alpha: 0.92, advance: Math.round(lineH * 1.25)
      });

      // Safari
      drawLine(`${bullet}Safari (macOS):`, { colour: colText, alpha: 0.92, weight: 800 });
      drawLine('Develop → Experimental Features → enable WebMIDI. Restart browser if required.', {
        colour: colMuted, alpha: 0.92, advance: Math.round(lineH * 1.25)
      });

      // Controls
      drawLine('Controls:', { colour: colText, alpha: 0.92, weight: 800, advance: Math.round(lineH * 1.05) });
      drawLine('• Breath controls height via CC2.', { alpha: 0.92 });
      drawLine('• Start / restart: three breath pulses.', { alpha: 0.92, advance: Math.round(lineH * 1.15) });

      // Close hint
      drawLine('Click anywhere to close this help.', { colour: colMuted, alpha: 0.85 });

      ctx.restore();
    }

    // ============================================================
    // UI hit rectangles (scene-space, pre-barrel) in device pixels
    // ============================================================
    function rectHit(r, x, y) {
      if (!r) return false;
      return x >= r.x && x <= (r.x + r.w) && y >= r.y && y <= (r.y + r.h);
    }

    function clientToViewPx(evt) {
      const rect = canvas.getBoundingClientRect();
      const xCss = evt.clientX - rect.left;
      const yCss = evt.clientY - rect.top;
      return { x: xCss * dpr, y: yCss * dpr };
    }

    canvas.addEventListener('click', async (e) => {
      // Ensure AudioContext is resumed on a user gesture.
      try { await ensureAudioFX(); } catch {}

      const { w, h } = resizeCanvasToDisplaySize();
      const v = clientToViewPx(e);
      const sxy = viewToScene(v.x, v.y, w, h);

      // Help open: click anywhere closes
      if (world.helpOpen) {
        world.helpOpen = false;
        return;
      }

      // Callsign edit (only meaningful on start/game-over screens, but safe always)
      if (rectHit(ui.callsignRect, sxy.x, sxy.y)) {
        openEditCallsignPrompt();
        return;
      }

      if (rectHit(ui.musicRect, sxy.x, sxy.y)) {
        setAudio(!audioOn);
        // If we turned ON, try to start immediately (interaction occurred)
        if (audioOn && world.started) await startMusicIfArmed();
        return;
      }

      if (rectHit(ui.helpRect, sxy.x, sxy.y)) {
        world.helpOpen = true;
        return;
      }

      if (rectHit(ui.backRect, sxy.x, sxy.y)) {
        window.location.href = './index.html';
        return;
      }
    });

    // ============================================================
    // Game lifecycle
    // ============================================================
    function resetGame() {
      const { w, h } = resizeCanvasToDisplaySize();

      world.started = false;
      world.over = false;

      world.survive = 0;
      world.playT = 0;
      world.speed = world.baseSpeed;

      world.distAcc = 0;
      world.obstacles = [];
      world.nextSpawnDist = 620;

      world.nextRestAt = REST_EVERY_S;
      world.restPending = false;
      world.resting = false;
      world.returning = false;
      world.restT = 0;
      world.returnT = 0;
      world.restScale = 1;
      world.restUiAlpha = 0;

      // Start screen: monkey waits left of stacks.
      player.x = Math.round(w * TITLE_MONKEY_X_FRAC);
      player.y = Math.round(h * TITLE_ROW_Y_FRAC);
      player.vy = 0;
      player.tilt = 0;

      tailVyFilt = 0;
      resetPulses();
    }

    function startGame() {
      if (!currentInput) return;

      if (world.over) resetGame();

      world.started = true;
      world.over = false;
      world.hasStartedOnce = true;

      const { w, h } = resizeCanvasToDisplaySize();
      player.x = Math.round(w * 0.22);
      player.y = Math.round(h * 0.50);
      player.vy = 0;
      player.tilt = 0;
      tailVyFilt = 0;

      resetPulses();
      startMusicIfArmed();
    }

    function gameOver() {
      world.over = true;
      world.started = false;

      resetPulses();
      stopMusic();

      // Clear obstacles on game over so the screen shows only background + UI layers.
      world.obstacles = [];
      world.distAcc = 0;
      world.nextSpawnDist = 620;

      // Auto-submit score (milliseconds). Prevent double-submit for same gameOver.
      const scoreMs = Math.max(0, Math.round(world.survive * 1000));
      if (lastSubmitMs !== scoreMs) {
        lastSubmitMs = scoreMs;
        (async () => {
          try {
            await submitScore(scoreMs);
            await fetchPersonalBest();
          } catch (e) {
            console.warn(e);
          }
        })();
      }

      world.restPending = false;
      world.resting = false;
      world.returning = false;
      world.restT = 0;
      world.returnT = 0;
      world.restScale = 1;
      world.restUiAlpha = 0;

      const { w, h } = resizeCanvasToDisplaySize();
      player.x = Math.round(w * TITLE_MONKEY_X_FRAC);
      player.y = Math.round(h * TITLE_ROW_Y_FRAC);
      player.vy = 0;
      player.tilt = 0;
      tailVyFilt = 0;
    }

    // ============================================================
    // Drawing
    // ============================================================
    const GLASS_STRENGTH = 0.2;   // 0..2 (visual)
    const GLASS_VIGNETTE = 0.9;   // 0..1
    const GLASS_HIGHLIGHT = 2;  // 0..1

    // ============================================================
    // Background tiling helper (FAST): pattern fill instead of per-tile drawImage loops
    // ============================================================
    const _bgPatternCache = new WeakMap();

    function _getBgPattern(source) {
      // source can be HTMLImageElement or HTMLCanvasElement
      let p = _bgPatternCache.get(source);
      if (!p) {
        p = ctx.createPattern(source, 'repeat');
        _bgPatternCache.set(source, p);
      }
      return p;
    }

    function drawBgTiledLayer(source, ready, xOffPx, w, h, opts = {}) {
      if (!ready || !source || source.width <= 0 || source.height <= 0) return;

      const alpha = (opts.alpha ?? 0.12);
      const scale = Math.max(0.01, (opts.scale ?? 1.0));
      const yOffPx = (opts.yOffPx ?? 0);

      const iw = source.width;
      const ih = source.height;

      // Same sizing rule you used: match canvas height then apply scale.
      const baseS = h / ih;
      const s = baseS * scale;

      if (s <= 0) return;

      // Wrap offsets so drift stays numerically bounded.
      const tileW = iw * s;
      const tileH = ih * s;

      const ox = -((xOffPx % tileW) + tileW) % tileW; // 0..tileW
      const oy = -((yOffPx % tileH) + tileH) % tileH; // 0..tileH

      const pat = _getBgPattern(source);
      if (!pat) return;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.imageSmoothingEnabled = true;

      // Scale the “world”, then fill a single rect with the repeating pattern.
      ctx.setTransform(s, 0, 0, s, ox, oy);
      ctx.fillStyle = pat;

      // Fill enough area in pattern-space to cover the screen after scaling.
      const pw = (w / s) + iw * 2;
      const ph = (h / s) + ih * 2;
      ctx.fillRect(-iw, -ih, pw, ph);

      ctx.restore();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function drawGlassShading(w, h) {
      if (GLASS_STRENGTH <= 0) return;

      ctx.save();

      // Highlight (soft-light style approximation using screen/overlay-ish)
      ctx.globalAlpha = 0.18 * GLASS_STRENGTH * GLASS_HIGHLIGHT;
      ctx.globalCompositeOperation = 'screen';
      let g = ctx.createRadialGradient(w * 0.50, h * 0.10, 0, w * 0.50, h * 0.10, Math.max(w, h) * 0.9);
      g.addColorStop(0.00, 'rgba(255,255,255,0.55)');
      g.addColorStop(0.35, 'rgba(255,255,255,0.12)');
      g.addColorStop(0.60, 'rgba(255,255,255,0.00)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      // Vignette (edge darkening)
      ctx.globalAlpha = 0.55 * GLASS_STRENGTH * GLASS_VIGNETTE;
      ctx.globalCompositeOperation = 'multiply';
      g = ctx.createRadialGradient(w * 0.50, h * 0.55, Math.min(w, h) * 0.35, w * 0.50, h * 0.55, Math.max(w, h) * 0.75);
      g.addColorStop(0.00, 'rgba(0,0,0,0.00)');
      g.addColorStop(1.00, 'rgba(0,0,0,0.85)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      ctx.restore();
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }

    function drawScene(w, h) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const didClipScene = clipSceneToScreen(w, h);

      const border = cssVar('--border');
      const accentA = cssVar('--accentA');
      const accentB = cssVar('--accentB');
      const text = cssVar('--text');
      const muted = cssVar('--muted');

      // Background remains black; add subtle vignette
      ctx.save();
      const v = ctx.createRadialGradient(w * 0.5, h * 0.5, Math.min(w, h) * 0.10, w * 0.5, h * 0.5, Math.min(w, h) * 0.80);
      v.addColorStop(0.0, 'rgba(0,0,0,0.00)');
      v.addColorStop(1.0, 'rgba(0,0,0,0.55)');
      ctx.fillStyle = v;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      // ============================================================
      // Parallax background (far + mid) — drawn behind obstacles
      // ============================================================
      const isTitle = (!world.started && !world.over);
      const isGameOver = (!!world.over);

      const bgAllowed =
        (world.started && !world.over) ||
        (isTitle && BG_SHOW_ON_TITLE) ||
        (isGameOver && BG_SHOW_ON_GAME_OVER);

      if (bgAllowed) {
        const isTitle = (!world.started && !world.over);
        const isGameOver = (!!world.over);

        const farA = (world.started && !world.over)
          ? BG_FAR_ALPHA_PLAY
          : (isTitle ? BG_FAR_ALPHA_TITLE : BG_FAR_ALPHA_GAMEOVER);

        const midA = (world.started && !world.over)
          ? BG_MID_ALPHA_PLAY
          : (isTitle ? BG_MID_ALPHA_TITLE : BG_MID_ALPHA_GAMEOVER);

        // 1) Draw FAR
        if (BG_FAR_ENABLED) {
          drawBgTiledLayer(bgFarImg, bgFarReady, bg.farX, w, h, {
            alpha: farA,
            scale: BG_FAR_SCALE
          });
        }

  // 2) Punch FAR out wherever MID has any pixels (binary mask), independent of mid alpha
  if (BG_MID_OCCLUDES_FAR && BG_FAR_ENABLED && bgMidMaskReady) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';

    // Use MID tiling parameters for the mask, so alignment matches mid perfectly.
    drawBgTiledLayer(bgMidMaskCanvas, true, bg.midX, w, h, {
      alpha: 1.0,
      scale: BG_MID_SCALE
    });

    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';
  }

  // 3) Draw MID on top (with its own alpha)
  if (BG_MID_ENABLED) {
    drawBgTiledLayer(bgMidImg, bgMidReady, bg.midX, w, h, {
      alpha: midA,
      scale: BG_MID_SCALE
    });
  }
}

      // Bottom UI placement (used to avoid the ground line cutting through buttons)
      const s = uiScalePx();
      const m = Math.round(10 * s * dpr);
      const by = h - m - Math.round(26 * s * dpr);

      // Horizontal-only safe margin (vertical stays exactly as before)
      const insetX = Math.round(SCREEN_CORNER_RADIUS_PX * UI_CORNER_INSET_FRAC * dpr);
      const mX = m + insetX;

      // Physics ground (unchanged)
      const groundYPhys = h - world.groundPad;

      // Visual ground line: keep it ABOVE the bottom controls
      const groundYDraw = computeGroundY(w, h);

      // Obstacles
      for (const ob of world.obstacles) {
        if (ob.kind === 'pipe') {
          ctx.fillStyle = accentA;
          ctx.fillRect(ob.x, ob.top.y, ob.top.w, ob.top.h);
          ctx.fillStyle = accentB;
          ctx.fillRect(ob.x, ob.bot.y, ob.bot.w, ob.bot.h);

          ctx.strokeStyle = border;
          ctx.lineWidth = 1 * dpr;
          ctx.strokeRect(ob.x + 0.5 * dpr, ob.top.y + 0.5 * dpr, ob.top.w - 1 * dpr, ob.top.h - 1 * dpr);
          ctx.strokeRect(ob.x + 0.5 * dpr, ob.bot.y + 0.5 * dpr, ob.bot.w - 1 * dpr, ob.bot.h - 1 * dpr);
        } else {
          ctx.fillStyle = accentA;
          ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
          ctx.strokeStyle = border;
          ctx.lineWidth = 1 * dpr;
          ctx.strokeRect(ob.x + 0.5 * dpr, ob.y + 0.5 * dpr, ob.w - 1 * dpr, ob.h - 1 * dpr);
        }
      }

      // Player
      const drawW = MONKEY_DRAW_W * dpr;
      const drawH = MONKEY_DRAW_H * dpr;

      if (monkeyReady) {
        const sLocal = (world.resting || world.returning) ? world.restScale : 1;
        drawMonkeyNeon(player.x, player.y, player.tilt, drawW, drawH, sLocal);
      } else {
        ctx.save();
        ctx.fillStyle = text;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 14 * dpr, 0, Math.PI * 2);
        ctx.fill();

        const pct = cc2 / 127;
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = (pct > 0.01) ? cssVar('--warn') : muted;
        ctx.beginPath();
        ctx.arc(player.x, player.y, Math.max(3 * dpr, Math.round(14 * dpr * (0.25 + 0.35 * pct))), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // =========================
      // On-CRT UI (NO duplication)
      // =========================
      const HUD_TOP_OFFSET_PX = 8; // CSS px, adjust 4–12
      const topY = m + Math.round(HUD_TOP_OFFSET_PX * dpr);

      // Decide whether top HUD should appear right now
      const showTopHudNow = HUD_TOP_ONLY_DURING_PLAY ? (world.started && !world.over) : true;

      // Compose strings
      const ventraText = (!('requestMIDIAccess' in navigator))
        ? 'Ventra not supported in this browser'
        : (currentInput ? 'Ventra connected' : 'Ventra not connected — plug in and refresh');

      const ccText = `CC2: ${String(cc2).padStart(3, '0')}`;
      const t1 = `Time ${world.survive.toFixed(1)} s`;
      const t2 = `Speed ${world.speed.toFixed(0)}`;

      // --- Top-left status (recommended to keep, but text-only/box) ---
      if (showTopHudNow && HUD_SHOW_TOP_LEFT_STATUS) {
        if (HUD_STYLE === 'text') {
          drawHudLabelLeft(
            mX,
            topY,
            ventraText,
            { colour: currentInput ? cssVar('--text') : cssVar('--muted'), alpha: currentInput ? HUD_TEXT_ALPHA : HUD_MUTED_ALPHA }
          );
        } else {
          drawHudContainer(
            mX,
            topY,
            ventraText,
            'left',
            { colour: currentInput ? cssVar('--text') : cssVar('--muted'), alpha: currentInput ? HUD_TEXT_ALPHA : HUD_MUTED_ALPHA }
          );
        }
      }

      // --- Top-right stack (CC2 always useful; time useful; speed default off) ---
      if (showTopHudNow) {
        let y = topY;

        // Right edge anchor (keep your corner inset behaviour)
        const xRight = w - mX;

        // CC2
        if (HUD_SHOW_CC2) {
          if (HUD_STYLE === 'text') {
            y += drawHudLabelRight(xRight, y, ccText, { colour: cssVar('--muted'), alpha: HUD_TEXT_ALPHA });
          } else {
            y += drawHudContainer(xRight, y, ccText, 'right', { colour: cssVar('--muted'), alpha: HUD_TEXT_ALPHA });
          }
        }

        // Time / Speed only during play (typical arcade behaviour)
        if (world.started && !world.over) {
          if (HUD_SHOW_TIME) {
            if (HUD_STYLE === 'text') {
              y += drawHudLabelRight(xRight, y, t1, { colour: cssVar('--muted'), alpha: HUD_MUTED_ALPHA });
            } else {
              y += drawHudContainer(xRight, y, t1, 'right', { colour: cssVar('--muted'), alpha: HUD_MUTED_ALPHA });
            }
          }

          if (HUD_SHOW_SPEED) {
            if (HUD_STYLE === 'text') {
              y += drawHudLabelRight(xRight, y, t2, { colour: cssVar('--muted'), alpha: HUD_MUTED_ALPHA });
            } else {
              y += drawHudContainer(xRight, y, t2, 'right', { colour: cssVar('--muted'), alpha: HUD_MUTED_ALPHA });
            }
          }
        }
      }

      // Leaderboard HUD (start + game over). Keep it near the top third.
      if (!world.started) {
        const yTop = Math.round(h * 0.36);
        drawLeaderboardHud(w, h, yTop);
      }
      // Back pill
      const back = drawTextPill(mX, by, 'Back', { colour: cssVar('--muted'), alpha: 0.28 });
      ui.backRect = back;

      // CALLSIGN pill (same baseline as Back / Speaker / Help)
      const CALLSIGN_GAP_PX = 12; // CSS px gap from Back pill
      const callsignX = back.x + back.w + Math.round(CALLSIGN_GAP_PX * s * dpr);

      // Use your existing callsign variable/state here.
      // If your code stores it as something else (e.g. playerCallsign), replace `callsign` below accordingly.
      const callsignLabel = 'CALLSIGN: ';
      const callsignValue = String(callsign || '').toUpperCase();

      // Draw and register hit-rect for editing
      const csPill = drawLabelValuePill(callsignX, by, callsignLabel, callsignValue, {
        alpha: 0.28,
        borderAlpha: 0.40,
        labelColour: cssVar('--muted'),
        valueColour: cssVar('--accentB'),
        textAlpha: 0.92
      });
      ui.callsignRect = csPill;

      // Help circle (right)
      const rBtn = Math.round(13 * s * dpr);
      const helpCx = w - mX - rBtn;
      const helpCy = by + rBtn;
      drawCircleButton(helpCx, helpCy, rBtn, { alpha: 0.90, borderAlpha: 0.45 });
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = cssVar('--text');
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `900 ${Math.round(14 * s * dpr)}px Orbitron, system-ui, sans-serif`;
      ctx.fillText('?', helpCx, helpCy + Math.round(0.5 * dpr));
      ctx.restore();
      ui.helpRect = { x: helpCx - rBtn, y: helpCy - rBtn, w: rBtn * 2, h: rBtn * 2 };

      // Speaker circle (left of help)
      const spCx = helpCx - Math.round((2 * rBtn + 10 * s * dpr));
      const spCy = helpCy;
      drawCircleButton(spCx, spCy, rBtn, { alpha: 0.90, borderAlpha: 0.45 });
      drawSpeakerIcon(spCx, spCy, Math.round(18 * s * dpr), audioOn);
      ui.musicRect = { x: spCx - rBtn, y: spCy - rBtn, w: rBtn * 2, h: rBtn * 2 };

      // Start screen title + instruction
      if (!world.started && !world.over) {
        const bigPx = Math.round((40 * s) * dpr);
        const smallPx = Math.round((16 * s) * dpr);

        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `900 ${smallPx}px Orbitron, system-ui, sans-serif`;
        ctx.globalAlpha = 0.70;
        ctx.fillStyle = muted;
        uiFillText(
          'VENTRA',
          Math.round(w * 0.5),
          Math.round(h * 0.205),
          muted,
          0.70,
          UI_TEXT_FX_INTENSITY_VENTRA_LOGO   // stronger FX only here
        );
        ctx.restore();

        drawGradientTitle('EXHALE//ASCEND', Math.round(w * 0.5), Math.round(h * 0.26), bigPx);

        const msg = currentInput
          ? 'Start with three breath pulses'
          : 'Plug in Ventra, refresh, then start';

        ctx.save();
        const tPx = Math.round((12 * s) * dpr);
        ctx.font = `${tPx}px "JetBrains Mono", ui-monospace, monospace`;
        ctx.fillStyle = muted;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalAlpha = 0.92;
        uiFillText(msg, Math.round(w * 0.5), Math.round(h * 0.34), muted, 0.92);
        ctx.restore();

        if (currentInput) {
          // 3-stack VU meter replacing “Pulses: X / 3”
          drawPulseVuStacks(
            Math.round(w * TITLE_STACKS_X_FRAC),
            Math.round(h * TITLE_ROW_Y_FRAC),
            {
              stacks: 3,
              segs: 7,
              stackWpx: PULSE_VU_W_PX,
              stackHpx: PULSE_VU_H_PX
            }
          );
        } else {
          // Keep a simple waiting line when no MIDI
          ctx.save();
          ctx.font = `${tPx}px "JetBrains Mono", ui-monospace, monospace`;
          ctx.fillStyle = muted;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.globalAlpha = 0.75;
          uiFillText('Waiting for MIDI device…', Math.round(w * 0.5), Math.round(h * 0.385), muted, 0.75);
          ctx.restore();
        }
      }

      // Game-over overlay
      if (world.over) {
        const s2 = uiScalePx();
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.font = `900 ${Math.round(26 * s2 * dpr)}px Orbitron, system-ui, sans-serif`;
        ctx.fillStyle = text;
        ctx.globalAlpha = 0.92;
        uiFillText('GAME OVER', Math.round(w * 0.5), Math.round(h * 0.26), text, 0.92);

        ctx.font = `${Math.round(12 * s2 * dpr)}px "JetBrains Mono", ui-monospace, monospace`;
        ctx.fillStyle = muted;
        ctx.globalAlpha = 0.88;
        uiFillText(`Survived: ${world.survive.toFixed(1)} s`, Math.round(w * 0.5), Math.round(h * 0.34), muted, 0.88);

        const msg = currentInput
          ? 'Restart with three breath pulses'
          : 'Plug in Ventra, refresh, then restart';

        uiFillText(msg, Math.round(w * 0.5), Math.round(h * 0.38), muted, 0.88);

        if (currentInput) {
          // Same 3-stack VU meter used on the start screen
          drawPulseVuStacks(
            Math.round(w * TITLE_STACKS_X_FRAC),
            Math.round(h * TITLE_ROW_Y_FRAC),
            {
              stacks: 3,
              segs: 7,
              stackWpx: PULSE_VU_W_PX,
              stackHpx: PULSE_VU_H_PX
            }
          );
        }

        ctx.restore();
      }

      // Breath phase overlay (unchanged)
      if (world.started && (world.resting || world.returning)) {
        const aUi = clamp(world.restUiAlpha, 0, 1);
        if (aUi > 0) {
          ctx.save();
          ctx.globalAlpha = REST_DIM_ALPHA * aUi;
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, w, h);
          ctx.restore();

          const dur = restDurationS();
          const u = clamp(world.restT / Math.max(1e-6, dur), 0, 1);
          const stepU = 1 / REST_COUNT;
          const idx = clamp(Math.floor(u / stepU), 0, REST_COUNT - 1);
          const countVal = Math.max(1, REST_COUNT - idx);

          ctx.save();
          ctx.globalAlpha = 0.92 * aUi;
          ctx.fillStyle = text;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          ctx.font = `${Math.round(18 * dpr)}px Orbitron, system-ui, sans-serif`;
          uiFillText('Breathe', Math.round(w * 0.5), Math.round(h * 0.42), text, 0.92 * aUi);

          ctx.font = `${Math.round(30 * dpr)}px Orbitron, system-ui, sans-serif`;
          uiFillText(String(countVal), Math.round(w * 0.5), Math.round(h * 0.50), text, 0.92 * aUi);

          ctx.font = `${Math.round(12 * dpr)}px "JetBrains Mono", ui-monospace, monospace`;
          uiFillText('Control paused', Math.round(w * 0.5), Math.round(h * 0.58), text, 0.78 * aUi);
          ctx.restore();
        }
      }

      if (world.started && world.restPending && !world.resting && !world.returning) {
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = text;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.font = `${Math.round(11 * dpr)}px "JetBrains Mono", ui-monospace, monospace`;
        ctx.fillText('Clearing…', Math.round(w - mX), Math.round(h - 44 * dpr));
        ctx.restore();
      }

      if (world.helpOpen) drawHelpOverlay(w, h);

      // Glass shading (curved-glass highlight + vignette), then CRT pattern
      drawGlassShading(w, h);

      // CRT overlay MUST be drawn over everything (title, UI, game)
      drawCrtOverlayIntoScene(w, h);

      // Film grain sits on top of the entire image
      drawFilmGrain(w, h, nowS);

      if (SHOW_COLLISION_DEBUG) {
        const a = Math.max(8 * dpr, (drawW * COLL_A_FRAC));
        const b = Math.max(6 * dpr, (drawH * COLL_B_FRAC));
        const theta = COLL_ROT + (COLL_FOLLOWS_SPRITE_TILT ? player.tilt : 0);

        const cx = player.x + (drawW * COLL_CX_OFF_FRAC);
        const cy = player.y + (drawH * COLL_CY_OFF_FRAC);

        drawEllipseDebug(cx, cy, a, b, theta);
      }

      if (didClipScene) ctx.restore();
    }

    // ============================================================
    // Main loop (physics/mechanics unchanged)
    // ============================================================
    let lastTs = 0;

    function step(ts) {
      const { w, h } = resizeCanvasToDisplaySize();

      nowS = ts * 0.001;

      refreshLeaderboardIfStale(nowS);

      // --- Time step split: real time vs simulation time --------------------
      // dtReal tracks wall-clock seconds (uncapped) for timers/leaderboard pacing.
      // dtSim is capped for simulation stability (prevents big jumps after stalls).
      const dtReal = Math.max(0, (ts - (lastTs || ts)) / 1000);

      // Keep gameplay speed consistent even if FPS drops.
      // Clamp only to avoid massive jumps after tab-switch or stalls.
      const dtSim = Math.min(0.033, Math.max(0, dtReal));

      lastTs = ts;
      // ----------------------------------------------------------------------

      // If Ventra disappears mid-run: stop play and return to start screen.
      if (!currentInput) {
        setCC2(0);
        if (world.started) {
          world.started = false;
          world.over = false;
          stopMusic();
          resetPulses();
          tailVyFilt = 0;

          world.restPending = false;
          world.resting = false;
          world.returning = false;
          world.restT = 0;
          world.returnT = 0;
          world.restScale = 1;
          world.restUiAlpha = 0;

          player.x = Math.round(w * 0.50);
          player.y = Math.round(h * 0.54);
          player.vy = 0;
          player.tilt = 0;
        }
      }

      registerPulse(Math.min(dtReal, 0.05));

      // After 3 strong pulses: show 3 full stacks, then start (also works from GAME OVER).
      if (!world.started && startDelayT > 0) {
        startDelayT = Math.max(0, startDelayT - dtReal);
        if (startDelayT === 0) {
          startGame(); // startGame() will resetGame() if world.over
        }
      }

      // Pulse VU animation (visual-only; runs on START and GAME OVER screens)
      if (!world.started && currentInput) {
        if (pulseWindowT > 0) {
          if (pulseVuAnimActive) {
            pulseVuAnim = expApproach(pulseVuAnim, 1, dtReal, PULSE_VU_FILL_TAU_S);
            if (pulseVuAnim > 0.999) {
              pulseVuAnim = 1;
              pulseVuAnimActive = false;
            }
          } else {
            pulseVuAnim = expApproach(pulseVuAnim, pulseVuAnim, dtReal, 0.2);
          }
        } else {
          pulseVuAnim = expApproach(pulseVuAnim, 0, dtReal, PULSE_VU_DUMP_TAU_S);
          pulseVuAnimActive = false;
        }
      } else {
        pulseVuAnim = expApproach(pulseVuAnim, 0, dtReal, 0.10);
        pulseVuAnimActive = false;
      }

      const groundY = computeGroundY(w, h);
      const ceilingY = world.topPad;

      if (world.started && !world.over) {
        const inBreak = (world.resting || world.returning);

        world.survive += dtReal;
        if (!inBreak) world.playT += dtReal;

        const targetSpeed = world.baseSpeed + SPEED_RAMP_PER_S * world.playT;

        if (FREEZE_SPEED_DURING_REST && inBreak) {
          // Hold speed constant through the pause so it cannot “catch up” while resting.
          world.speed = world.speedHold || world.speed;
        } else {
          world.speed = expApproach(world.speed, targetSpeed, dtSim, SPEED_TAU_S);
        }

        if (!world.restPending && !inBreak && world.playT >= world.nextRestAt) {
          world.restPending = true;
        }

        const scrollVx = world.speed * dpr;
        // Background parallax scroll: derived from the same speed as obstacles.
        // Optionally freeze during breath breaks for coherence.
        const bgCanMove = !BG_FREEZE_DURING_REST || !inBreak;

        if (bgCanMove) {
          if (BG_FAR_ENABLED && bgFarReady) {
            // advance in scene px; wrap lazily inside draw helper via modulo
            bg.farX += (scrollVx * BG_FAR_PARALLAX) * dtSim;
          }
          if (BG_MID_ENABLED && bgMidReady) {
            bg.midX += (scrollVx * BG_MID_PARALLAX) * dtSim;
          }
        }
        for (const ob of world.obstacles) {
          ob.x -= scrollVx * dtSim;
        }

        while (world.obstacles.length && (world.obstacles[0].x + (world.obstacles[0].w || world.obstacles[0].top.w)) < -40 * dpr) {
          world.obstacles.shift();
        }

        if (world.restPending && !inBreak && world.obstacles.length === 0) {
          world.restPending = false;
          world.resting = true;
          world.returning = false;
          world.restT = 0;
          world.returnT = 0;
          world.restScale = REST_FLYIN_SCALE_FROM;
          world.restUiAlpha = 1;
          world.distAcc = 0;
          player.vy = 0;
          player.tilt = 0;
          tailVyFilt = 0;
          world.speedHold = world.speed;
          world.pendingPlayTRewind = POST_REST_PLAYT_REWIND_S;
        }

        if (world.resting) {
          world.restT += dtSim;

          const dur = restDurationS();
          const u = clamp(world.restT / Math.max(1e-6, dur), 0, 1);

          const centreX = Math.round(w * REST_CENTRE_X_FRAC);
          const centreY = Math.round(h * REST_CENTRE_Y_FRAC);

          player.x = expApproach(player.x, centreX, dtSim, REST_MOVE_TAU_S);
          player.y = expApproach(player.y, centreY, dtSim, REST_MOVE_TAU_S);

          player.vy = 0;
          player.tilt = 0;

          const flyU = clamp(u / Math.max(1e-6, REST_FLYIN_FRACTION), 0, 1);
          const baseScale = REST_FLYIN_SCALE_FROM + (REST_BASE_SCALE - REST_FLYIN_SCALE_FROM) * flyU;

          const phase = u * REST_PULSES * Math.PI * 2;
          const pulse01 = 0.5 - 0.5 * Math.cos(phase);
          world.restScale = baseScale * (1 + REST_PULSE_SCALE * pulse01);

          tailVyFilt = expApproach(tailVyFilt, 0, dtSim, 0.06);

          if (world.restT >= dur) {
            world.restT = dur;
            world.resting = false;
            world.returning = true;
            world.returnT = 0;
            world.restUiAlpha = 1;

            player.vy = 0;
            player.tilt = 0;
            tailVyFilt = 0;

            world.nextRestAt += REST_EVERY_S;
          }
        }

        if (world.returning) {
          world.returnT += dtSim;

          const dur = restDurationS();
          const returnS = Math.max(0.05, dur * REST_RETURN_FRACTION);

          const laneX = Math.round(w * 0.22);
          const centreY = Math.round(h * REST_CENTRE_Y_FRAC);

          world.restUiAlpha = clamp(1 - (world.returnT / Math.max(1e-6, REST_UI_FADE_S)), 0, 1);

          player.x = expApproach(player.x, laneX, dtSim, REST_RETURN_TAU_S);
          player.y = expApproach(player.y, centreY, dtSim, REST_RETURN_TAU_S);

          world.restScale = expApproach(world.restScale, 1, dtSim, REST_RETURN_TAU_S);

          player.vy = 0;
          player.tilt = 0;
          tailVyFilt = expApproach(tailVyFilt, 0, dtSim, 0.06);

          if (world.returnT >= returnS) {
            world.returning = false;
            world.returnT = 0;
            world.restUiAlpha = 0;
            world.restScale = 1;

            player.x = laneX;
            player.vy = 0;
            player.tilt = 0;
            tailVyFilt = 0;

            // Slightly reduce the ramp after a pause (optional difficulty smoothing).
            if (world.pendingPlayTRewind > 0) {
              world.playT = Math.max(0, world.playT - world.pendingPlayTRewind);
              world.pendingPlayTRewind = 0;

              // Ensure speed is not above the newly lowered target.
              const newTarget = world.baseSpeed + SPEED_RAMP_PER_S * world.playT;
              world.speed = Math.min(world.speed, newTarget);
            }
            world.distAcc = 0;
          }
        }

        if (!world.resting && !world.returning) {
          const pct = cc2 / 127;
          const maxLift = (groundY - 14 * dpr) - (ceilingY + 14 * dpr);
          const targetY = (groundY - 14 * dpr) - (pct * maxLift);

          const speedFactor = clamp(world.speed / world.baseSpeed, 1, 3.2);
          const K = K_BASE * (1 + K_BOOST * (speedFactor - 1));
          const DAMP = DAMP_BASE * (0.95 + 0.25 * (speedFactor - 1));

          const speedFade = clamp((speedFactor - 1) / (3.2 - 1), 0, 1);
          const ccFade = clamp(cc2 / G_FALL_CC_MAX, 0, 1);
          const fallScale = (G_FALL_SCALE_MIN + (1 - G_FALL_SCALE_MIN) * ccFade);
          const gEff = G * (fallScale + (1 - fallScale) * speedFade);

          let ay = (K * (targetY - player.y)) - (DAMP * player.vy) + gEff;

          player.vy += ay * dtSim;
          player.vy = clamp(player.vy, -VTERM * dpr, VTERM * dpr);
          player.y += player.vy * dtSim;

          {
            const alpha = 1 - Math.exp(-dtSim / Math.max(1e-6, TAIL_VY_TAU_S));
            tailVyFilt = tailVyFilt + alpha * (player.vy - tailVyFilt);
          }

          player.tilt = clamp(-player.vy / (900 * dpr), -0.20, 0.20);

          const floorY = groundY - 14 * dpr;
          if (player.y > floorY) { player.y = floorY; if (player.vy > 0) player.vy = 0; }
          const ceilY = ceilingY + 14 * dpr;
          if (player.y < ceilY) { player.y = ceilY; if (player.vy < 0) player.vy = 0; }

          const t = world.playT;
          const startMean = 760 * dpr;
          const endMean = 560 * dpr;
          const ease = clamp(t / 18, 0, 1);
          const mean = startMean + (endMean - startMean) * ease;
          const jitter = 0.18;

          world.distAcc += (world.speed * dpr) * dtSim;

          if (!world.restPending) {
            if (world.distAcc >= world.nextSpawnDist) {
              world.distAcc = 0;
              spawnObstacle(w, h);
              const r = (Math.random() * 2 - 1) * jitter;
              world.nextSpawnDist = Math.max(420 * dpr, mean * (1 + r));
            }
          } else {
            world.distAcc = Math.min(world.distAcc, world.nextSpawnDist - 0.001);
          }

          const drawW = MONKEY_DRAW_W * dpr;
          const drawH = MONKEY_DRAW_H * dpr;
          const a = Math.max(8 * dpr, (drawW * COLL_A_FRAC));
          const b = Math.max(6 * dpr, (drawH * COLL_B_FRAC));
          const collTheta = COLL_ROT + (COLL_FOLLOWS_SPRITE_TILT ? player.tilt : 0);

          const cx = player.x + (drawW * COLL_CX_OFF_FRAC);
          const cy = player.y + (drawH * COLL_CY_OFF_FRAC);

          for (const ob of world.obstacles) {
            if (ob.kind === 'pipe') {
              if (
                ellipseRectHit(cx, cy, a, b, collTheta, ob.x, ob.top.y, ob.top.w, ob.top.h) ||
                ellipseRectHit(cx, cy, a, b, collTheta, ob.x, ob.bot.y, ob.bot.w, ob.bot.h)
              ) { gameOver(); break; }
            } else {
              if (ellipseRectHit(cx, cy, a, b, collTheta, ob.x, ob.y, ob.w, ob.h)) {
                gameOver(); break;
              }
            }
          }
        }
      } else {
        player.tilt = 0;
        tailVyFilt *= 0.90;
        world.restScale = 1;
        world.restUiAlpha = 0;

        // Title + Game Over: monkey sits left of the VU stacks, gently bobbing.
        {
          const targetX = Math.round(w * TITLE_MONKEY_X_FRAC);

          const baseY = Math.round(h * TITLE_ROW_Y_FRAC);
          const omega = Math.PI * 2 * TITLE_MONKEY_BOB_HZ;
          const bob = Math.sin(nowS * omega) * (TITLE_MONKEY_BOB_AMP_PX * dpr);

          const targetY = Math.round(baseY + bob);

          // Smooth approach so it feels alive rather than “locked”.
          player.x = expApproach(player.x, targetX, dtReal, 0.12);
          player.y = expApproach(player.y, targetY, dtReal, 0.16);
        }
      }

      drawScene(w, h);
      presentWithBarrel(w, h);

      requestAnimationFrame(step);
    }

    function onMIDIMessage(e) {
      const data = e.data;
      if (!data || data.length < 3) return;

      const status = data[0];
      const type = status & 0xF0;

      const targetStatus = 0xB0 | ((targetChannel1Based - 1) & 0x0F);
      if (type === 0xB0 && status === targetStatus && data[1] === targetCC) {
        setCC2(data[2]);
      }
    }

    // ============================================================
    // Boot
    // ============================================================
    // Ensure CSS rounding is applied immediately (before first frame)
    document.documentElement.style.setProperty('--screen-radius-px', `${SCREEN_CORNER_RADIUS_PX}px`);

    // Leaderboard identity (persistent across sessions)
    ensureIdentity();

    // Initial fetch (non-blocking)
    (async () => {
      try { await Promise.all([fetchPersonalBest(), fetchTop10()]); } catch {}
    })();

    resetGame();
    setCC2(0);
    requestAnimationFrame(step);
  </script>
